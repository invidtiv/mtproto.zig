name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the workflow level; each job widens only what it needs.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Only this job manages release PRs/issues.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: release-please
    runs-on: ubuntu-latest
    # Only needs to upload release assets — not issues/PR write.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            artifact_name: mtproto-proxy-linux-x86_64
            binary: mtproto-proxy
            cpu: ""
          - target: x86_64-linux
            artifact_name: mtproto-proxy-linux-x86_64_v3
            binary: mtproto-proxy
            cpu: x86_64_v3+aes
          - target: aarch64-linux
            artifact_name: mtproto-proxy-linux-aarch64
            binary: mtproto-proxy
            cpu: ""
          - target: x86_64-linux
            artifact_name: mtbuddy-linux-x86_64
            binary: mtbuddy
            cpu: ""
          - target: x86_64-linux
            artifact_name: mtbuddy-linux-x86_64_v3
            binary: mtbuddy
            cpu: x86_64_v3+aes
          - target: aarch64-linux
            artifact_name: mtbuddy-linux-aarch64
            binary: mtbuddy
            cpu: ""

    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Verify AES-enabled x86_64_v3 profile
        if: contains(matrix.cpu, 'x86_64_v3')
        run: |
          cat > /tmp/check_aes_target.zig <<'EOF'
          const std = @import("std");

          comptime {
              if (!std.crypto.core.aes.has_hardware_support) {
                  @compileError("x86_64_v3 release artifacts must be built with +aes");
              }
          }

          pub fn main() void {}
          EOF
          zig build-exe -target "${{ matrix.target }}" -mcpu "${{ matrix.cpu }}" /tmp/check_aes_target.zig

      - name: Build release binary
        run: |
          PINNED_MINISIGN_PUBKEY="RWT8YwmUuq/3WpUnYJjD6rAfQugYdZKWr61U3O+2kdNvriLSyrvVU/NO"
          BUILD_ARGS="-Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}"
          if [ -n "${{ matrix.cpu }}" ]; then
            BUILD_ARGS="$BUILD_ARGS -Dcpu=${{ matrix.cpu }}"
          fi
          BUILD_ARGS="$BUILD_ARGS -Dminisign_pubkey=${PINNED_MINISIGN_PUBKEY}"
          zig build $BUILD_ARGS

      - name: Package artifact
        run: |
          mkdir -p dist
          cp zig-out/bin/${{ matrix.binary }} dist/${{ matrix.artifact_name }}
          chmod +x dist/${{ matrix.artifact_name }}
          tar -C dist -czf dist/${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}
          (
            cd dist
            sha256sum ${{ matrix.artifact_name }}.tar.gz > ${{ matrix.artifact_name }}.tar.gz.sha256
          )

      - name: Sign checksum with minisign
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          PINNED_MINISIGN_PUBKEY="RWT8YwmUuq/3WpUnYJjD6rAfQugYdZKWr61U3O+2kdNvriLSyrvVU/NO"
          if [ -z "${MINISIGN_SECRET_KEY}" ]; then
            echo "MINISIGN_SECRET_KEY is required for release signing"
            exit 1
          fi
          sudo apt-get update -qq
          sudo apt-get install -y minisign

          printf '%s\n' "${MINISIGN_SECRET_KEY}" > /tmp/minisign.key
          chmod 600 /tmp/minisign.key
          printf '%s\n' "untrusted comment: mtproto.zig minisign public key" > dist/minisign.pub
          printf '%s\n' "${PINNED_MINISIGN_PUBKEY}" >> dist/minisign.pub
          minisign -S \
            -s /tmp/minisign.key \
            -m dist/${{ matrix.artifact_name }}.tar.gz.sha256 \
            -x dist/${{ matrix.artifact_name }}.tar.gz.sha256.minisig \
            -t "tag:${{ needs.release-please.outputs.tag_name }} artifact:${{ matrix.artifact_name }}"
          minisign -V \
            -q \
            -m dist/${{ matrix.artifact_name }}.tar.gz.sha256 \
            -x dist/${{ matrix.artifact_name }}.tar.gz.sha256.minisig \
            -P "${PINNED_MINISIGN_PUBKEY}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=(
            "dist/${{ matrix.artifact_name }}.tar.gz"
            "dist/${{ matrix.artifact_name }}.tar.gz.sha256"
            "dist/${{ matrix.artifact_name }}.tar.gz.sha256.minisig"
            "dist/minisign.pub"
          )
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "${FILES[@]}" \
            --clobber
