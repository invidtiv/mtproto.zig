name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: this workflow only reads the repo. Without this block the
# GITHUB_TOKEN inherits the repo/org default, which can be read-write to all scopes.
permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test

      - name: Debug build
        run: zig build

      - name: Release build (native)
        run: zig build -Doptimize=ReleaseFast

      - name: Cross-compile for Linux x86_64
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux

      - name: Cross-compile for Linux x86_64_v3+aes
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux -Dcpu=x86_64_v3+aes

      - name: Verify binary exists
        run: |
          ls -lh zig-out/bin/mtproto-proxy
          file zig-out/bin/mtproto-proxy

  e2e:
    name: E2E Integration
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Run E2E harness
        run: zig build e2e

  bench:
    name: Bench (No Soak)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Run microbenchmark
        run: zig build -Doptimize=ReleaseFast bench 2>&1 | tee bench-output.txt

      - name: Run handshake-path benchmark (inline candidates)
        run: zig build -Doptimize=ReleaseFast bench -- handshake-path --iterations=500000 --candidate-count=4 2>&1 | tee handshake-path-inline-output.txt

      - name: Run handshake-path benchmark (heap fallback)
        run: zig build -Doptimize=ReleaseFast bench -- handshake-path --iterations=200000 --candidate-count=8 2>&1 | tee handshake-path-heap-output.txt

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bench-results
          path: |
            bench-output.txt
            handshake-path-inline-output.txt
            handshake-path-heap-output.txt
          retention-days: 90
