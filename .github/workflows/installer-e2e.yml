name: Installer E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/installer-e2e.yml"
      - "deploy/bootstrap.sh"
      - "src/ctl/**"
      - "src/version.zig"
      - "test/installer-e2e/**"
      - "build.zig"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/installer-e2e.yml"
      - "deploy/bootstrap.sh"
      - "src/ctl/**"
      - "src/version.zig"
      - "test/installer-e2e/**"
      - "build.zig"

concurrency:
  group: installer-e2e-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  installer-e2e:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:11
            name: debian-11
          - image: debian:12
            name: debian-12
          - image: ubuntu:20.04
            name: ubuntu-20-04
          - image: ubuntu:22.04
            name: ubuntu-22-04
          - image: ubuntu:24.04
            name: ubuntu-24-04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Run installer E2E
        env:
          MTPROTO_INSTALLER_E2E_IMAGES: ${{ matrix.image }}
          MTPROTO_INSTALLER_E2E_VERSION: latest
        run: test/installer-e2e/run.sh

      - name: Upload installer E2E logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-e2e-${{ matrix.name }}
          path: test/installer-e2e/logs/
          if-no-files-found: ignore
          retention-days: 14
