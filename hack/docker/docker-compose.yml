services:
  mtg-zig:
    image: mtproto-zig:<change_me>
    container_name: mtg-zig
    restart: unless-stopped
    pids_limit: 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc: 65535
    volumes:
      - ./zigconf.toml:/etc/mtproto-proxy/config.toml:ro
    ports:
      - "10000:8443"
      - "127.0.0.1:9400:9400"

  prometheus:
    # Pinned (not :latest) for reproducible monitoring; bump deliberately.
    image: prom/prometheus:v2.53.0
    container_name: mtg-prometheus
    restart: unless-stopped
    depends_on:
      - mtg-zig
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    # Pinned (not :latest) for reproducibility; bump deliberately.
    image: grafana/grafana:11.0.0
    container_name: mtg-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      # No hardcoded admin/admin. Set these in a .env file next to the compose
      # file; the password is required (compose errors if it is unset).
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD (e.g. in hack/docker/.env)}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  prometheus-data:
  grafana-data:
